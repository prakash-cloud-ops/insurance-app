version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: insurance-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: insurancedb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - insurance-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insurance-backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: insurancedb
      DB_USER: root
      DB_PASSWORD: rootpassword
      SERVER_PORT: 8080
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      JWT_EXPIRATION: 86400000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redispassword
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_POLICY_EVENTS: policy.events
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - insurance-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: insurance-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - insurance-network
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - insurance-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - insurance-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redispassword --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: redis-cli --no-auth-warning -a redispassword ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - insurance-network
    restart: unless-stopped

  audit-consumer:
    build:
      context: ./audit-consumer
      dockerfile: Dockerfile
    container_name: audit-consumer
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: insurancedb
      DB_USER: root
      DB_PASSWORD: rootpassword
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_POLICY_EVENTS: policy.events
    networks:
      - insurance-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  insurance-network:
    driver: bridge
